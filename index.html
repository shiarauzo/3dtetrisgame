<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stakk</title>
  <meta name="description" content="Stakk - A minimal 3D Tetris game">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #F5F0E6;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      color: #1a1a1a;
    }

    .hidden { display: none !important; }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Game View - Full screen canvas */
    #game-view {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: manipulation;
    }

    /* Minimal UI overlay */
    .ui-overlay {
      position: fixed;
      pointer-events: none;
    }

    .ui-overlay > * {
      pointer-events: auto;
    }

    /* Top left - Next piece */
    #next-piece-container {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      background: rgba(245, 240, 230, 0.95);
      padding: 1rem;
      z-index: 10;
    }

    #next-piece-container span {
      display: block;
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      opacity: 0.6;
      margin-bottom: 0.75rem;
    }

    #next-piece-canvas {
      background: transparent;
      display: block;
    }

    /* Top right - Stats */
    #stats-container {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      text-align: right;
      background: rgba(245, 240, 230, 0.95);
      padding: 1rem;
      z-index: 10;
    }

    .stat {
      margin-bottom: 0.75rem;
    }

    .stat:last-child {
      margin-bottom: 0;
    }

    .stat-label {
      font-size: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      opacity: 0.6;
      margin-bottom: 0.25rem;
    }

    .stat-value {
      font-size: 0.9rem;
    }

    /* Bottom - Controls hint */
    #controls-hint {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      font-size: 0.35rem;
      opacity: 0.4;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: rgba(245, 240, 230, 0.95);
      padding: 0.75rem 1rem;
      z-index: 10;
    }

    /* Bottom center container */
    #bottom-center {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 10;
    }

    /* Ko-fi */
    #kofi-link {
      font-size: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #1a1a1a;
      text-decoration: none;
      opacity: 0.5;
      background: rgba(245, 240, 230, 0.95);
      padding: 0.75rem 1rem;
      transition: opacity 0.2s;
    }

    #kofi-link:hover {
      opacity: 1;
    }

    /* Help button */
    #help-button {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(245, 240, 230, 0.95);
      color: #1a1a1a;
      border: 1px solid rgba(26, 26, 26, 0.2);
      font-size: 0.6rem;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    #help-button:hover { opacity: 1; }
    #help-button:focus-visible { outline: 2px solid #1a1a1a; outline-offset: 2px; }

    /* Help Backdrop */
    #help-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(26, 26, 26, 0.8);
      z-index: 999;
    }

    /* Help Panel */
    #help-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1a1a1a;
      color: #F5F0E6;
      padding: 2rem;
      z-index: 1000;
      min-width: 300px;
      overscroll-behavior: contain;
    }

    #help-panel h2 {
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
    }

    #help-panel table {
      width: 100%;
      border-collapse: collapse;
    }

    #help-panel td {
      padding: 0.5rem 0;
      font-size: 0.4rem;
    }

    #help-panel td:last-child {
      text-align: right;
      opacity: 0.6;
    }

    #help-panel button {
      margin-top: 1.5rem;
      background: transparent;
      color: #F5F0E6;
      border: 1px solid rgba(245, 240, 230, 0.3);
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #help-panel button:hover { border-color: #F5F0E6; }
    #help-panel button:focus-visible { outline: 2px solid #F5F0E6; outline-offset: 2px; }

    /* Pause Overlay */
    #pause-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(26, 26, 26, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      overscroll-behavior: contain;
    }

    #pause-overlay h2 {
      color: #F5F0E6;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 1rem;
    }

    #pause-timer {
      color: #F5F0E6;
      opacity: 0.5;
      font-size: 0.5rem;
      margin-bottom: 2rem;
    }

    #pause-overlay button {
      background: transparent;
      color: #F5F0E6;
      border: 1px solid rgba(245, 240, 230, 0.3);
      padding: 0.75rem 2rem;
      margin: 0.25rem;
      cursor: pointer;
      font-size: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #pause-overlay button:hover { border-color: #F5F0E6; }
    #pause-overlay button:focus-visible { outline: 2px solid #F5F0E6; outline-offset: 2px; }

    /* Game Over */
    #game-over {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #F5F0E6;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #game-over h2 {
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 2rem;
      opacity: 0.5;
    }

    #final-score {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    #rank-position {
      font-size: 0.5rem;
      opacity: 0.5;
      margin-bottom: 2rem;
    }

    #game-over input {
      font-family: inherit;
      font-size: 0.5rem;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(26, 26, 26, 0.2);
      background: transparent;
      text-align: center;
      width: 200px;
      margin-bottom: 1.5rem;
    }

    #game-over input:focus {
      outline: none;
      border-color: #1a1a1a;
    }

    #game-over .buttons {
      display: flex;
      gap: 0.5rem;
    }

    #game-over button {
      background: transparent;
      color: #1a1a1a;
      border: 1px solid rgba(26, 26, 26, 0.2);
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      font-size: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #game-over button:hover { border-color: #1a1a1a; }
    #game-over button:focus-visible { outline: 2px solid #1a1a1a; outline-offset: 2px; }

    /* Ranking View */
    #ranking-view {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #F5F0E6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem;
      z-index: 1000;
      overflow-y: auto;
    }

    #ranking-view h2 {
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 2rem;
      opacity: 0.5;
    }

    .filter-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .filter-tabs button {
      background: transparent;
      border: 1px solid rgba(26, 26, 26, 0.2);
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .filter-tabs button.active {
      background: #1a1a1a;
      color: #F5F0E6;
      border-color: #1a1a1a;
    }

    .filter-tabs button:focus-visible { outline: 2px solid #1a1a1a; outline-offset: 2px; }

    #ranking-list {
      width: 100%;
      max-width: 400px;
    }

    .ranking-entry {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(26, 26, 26, 0.1);
      font-size: 0.4rem;
    }

    #back-button {
      margin-top: 2rem;
      background: transparent;
      color: #1a1a1a;
      border: 1px solid rgba(26, 26, 26, 0.2);
      padding: 0.75rem 2rem;
      cursor: pointer;
      font-size: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #back-button:hover { border-color: #1a1a1a; }
    #back-button:focus-visible { outline: 2px solid #1a1a1a; outline-offset: 2px; }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <!-- Game View (starts immediately) -->
  <div id="game-view">
    <canvas id="game-canvas" aria-label="3D Tetris game"></canvas>

    <!-- Next piece -->
    <div id="next-piece-container">
      <span>Next</span>
      <canvas id="next-piece-canvas" width="120" height="120" aria-label="Next piece preview"></canvas>
    </div>

    <!-- Stats -->
    <div id="stats-container">
      <div class="stat">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Level</div>
        <div class="stat-value" id="level">1</div>
      </div>
      <div class="stat">
        <div class="stat-label">Combo</div>
        <div class="stat-value" id="combo">0</div>
      </div>
    </div>

    <!-- Controls hint -->
    <div id="controls-hint">Arrows · Q/E R/F · Space · Mouse · Scroll to zoom</div>

    <!-- Bottom center: Ko-fi + Help -->
    <div id="bottom-center">
      <a id="kofi-link" href="https://ko-fi.com/shiaradesign" target="_blank" rel="noopener noreferrer">Buy me a coffee ♥</a>
      <button id="help-button" aria-label="Show controls help">?</button>
    </div>
  </div>

  <!-- Help Backdrop -->
  <div id="help-backdrop" class="hidden"></div>

  <!-- Help Panel -->
  <div id="help-panel" class="hidden">
    <h2>Controls</h2>
    <table>
      <tr><td>Move</td><td>Arrow keys</td></tr>
      <tr><td>Rotate H</td><td>Q / E</td></tr>
      <tr><td>Rotate V</td><td>R / F</td></tr>
      <tr><td>Drop</td><td>Space</td></tr>
      <tr><td>Camera</td><td>Mouse drag</td></tr>
      <tr><td>Zoom</td><td>Scroll</td></tr>
      <tr><td>Snap</td><td>X / Y / Z</td></tr>
      <tr><td>Pause</td><td>Esc</td></tr>
    </table>
    <button id="close-help">Close</button>
  </div>

  <!-- Pause Overlay -->
  <div id="pause-overlay" class="hidden">
    <h2>Paused</h2>
    <div id="pause-timer"></div>
    <button id="continue-button">Continue</button>
    <button id="exit-button">Restart</button>
  </div>

  <!-- Game Over -->
  <div id="game-over" class="hidden">
    <h2>Game Over</h2>
    <div id="final-score">0</div>
    <div id="rank-position"></div>
    <label for="nickname-input" class="visually-hidden">Nickname</label>
    <input type="text" id="nickname-input" placeholder="Your name" maxlength="20" autocomplete="nickname" aria-label="Enter your nickname">
    <div class="buttons">
      <button id="submit-score">Submit</button>
      <button id="play-again">Play Again</button>
      <button id="view-ranking">Rankings</button>
    </div>
  </div>

  <!-- Ranking View -->
  <div id="ranking-view" class="hidden">
    <h2>Rankings</h2>
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="global">All Time</button>
      <button class="filter-tab" data-filter="daily">Today</button>
      <button class="filter-tab" data-filter="weekly">Week</button>
    </div>
    <div id="ranking-list"></div>
    <button id="back-button">Back</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
